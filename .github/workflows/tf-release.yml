# On a release-candidate tag (e.g. v0.7.0-rc1), builds the source tarball and
# convenience binaries and publishes them as a GitHub prerelease. The release
# manager drives the rest from dev/release/release_rc.sh (see docs/releasing.md);
# CI never signs.

name: Terraform Build Release Candidate

on:
  push:
    tags:
      # RC tags only; the final vX.Y.Z tag is published by release.sh.
      - 'v*-rc*'

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-release:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # v0.7.0-rc1 -> version=0.7.0, rc=1
          version=${TAG#v}
          version=${version%-rc*}
          rc=${TAG##*-rc}
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "rc=${rc}" >> "$GITHUB_OUTPUT"

      - name: Build source tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RC: ${{ steps.version.outputs.rc }}
        run: |
          # -rc in the filename, but unpacks to a dir without it so the tree
          # matches the final release.
          dir="apache-iceberg-terraform-${VERSION}"
          tar_gz="apache-iceberg-terraform-${VERSION}-rc${RC}.tar.gz"
          git archive --format=tar.gz --prefix="${dir}/" -o "${tar_gz}" HEAD
          sha512sum "${tar_gz}" > "${tar_gz}.sha512"

      - name: Upload source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-release-candidate
          path: apache-iceberg-terraform-*.tar.gz*
          if-no-files-found: error

  binary-release:
    name: Build provider binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version=${TAG#v}
          version=${version%-rc*}
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
          cache-dependency-path: go.sum

      - name: Build artifacts with GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          # Build only; signing and publishing happen later.
          args: release --clean --skip=sign,publish,validate
        env:
          # Name artifacts with the final version (0.7.0, not 0.7.0-rc1) so the
          # voted binaries can be promoted unchanged. Skipping validate lets this
          # override GoReleaser's tag-derived version.
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

      - name: Stage registry manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # GoReleaser hashes the manifest into SHA256SUMS but only copies it to
          # dist/ during the skipped publish stage, so stage it here.
          cp terraform-registry-manifest.json \
            "dist/terraform-provider-iceberg_${VERSION}_manifest.json"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-release-candidate
          path: |
            dist/*.zip
            dist/*_SHA256SUMS
            dist/*_manifest.json
          if-no-files-found: error

  create-prerelease:
    name: Create GitHub prerelease
    needs:
      - source-release
      - binary-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download source artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-release-candidate
          path: artifacts

      - name: Download binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-release-candidate
          path: artifacts

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # release_rc.sh adds signatures afterwards; CI never signs.
          gh release create "${TAG}" \
            --prerelease \
            --verify-tag \
            --title "Apache Iceberg Terraform provider ${TAG}" \
            --generate-notes \
            artifacts/*
